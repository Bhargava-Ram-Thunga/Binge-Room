name: Project Lifecycle - PRs

on:
  pull_request:
    types: [opened, closed]

jobs:
  pr-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Process PR event
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          PROJECT_ID: PVT_kwHOBd-eFs4BU-R3
          FIELD_ID: PVTSSF_lAHOBd-eFs4BU-R3zhPJxp4
          BUILDING_OPTION_ID: fb71c5cb
          SHIPPED_OPTION_ID: 9d1ea668
        run: |
          if [[ "${{ github.event.action }}" == "opened" ]]; then
            echo "PR opened. Moving linked issues to Building..."

            # Get linked issues using gh pr view
            LINKED_ISSUES=$(gh pr view ${{ github.event.pull_request.number }} --json linkedIssues | jq -r '.linkedIssues[].nodeId')

            for ISSUE_NODE_ID in $LINKED_ISSUES; do
              ITEM_ID=$(gh project item-list "$PROJECT_ID" --owner "Bhargava-Ram-Thunga" --format json | jq -r '.items[] | select(.content.id == "'$ISSUE_NODE_ID'") | .id')
              if [ -n "$ITEM_ID" ]; then
                echo "Moving item $ITEM_ID to Building"
                gh project item-edit --id "$ITEM_ID" --field-id "$FIELD_ID" --single-select-option-id "$BUILDING_OPTION_ID" --project-id "$PROJECT_ID"
              fi
            done

          elif [[ "${{ github.event.action }}" == "closed" ]] && [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
            echo "PR merged. Moving linked issues to Shipped and closing them..."

            LINKED_ISSUES=$(gh pr view ${{ github.event.pull_request.number }} --json linkedIssues | jq -r '.linkedIssues[].nodeId')

            for ISSUE_NODE_ID in $LINKED_ISSUES; do
              # Move to Shipped
              ITEM_ID=$(gh project item-list "$PROJECT_ID" --owner "Bhargava-Ram-Thunga" --format json | jq -r '.items[] | select(.content.id == "'$ISSUE_NODE_ID'") | .id')
              if [ -n "$ITEM_ID" ]; then
                echo "Moving item $ITEM_ID to Shipped"
                gh project item-edit --id "$ITEM_ID" --field-id "$FIELD_ID" --single-select-option-id "$SHIPPED_OPTION_ID" --project-id "$PROJECT_ID"
              fi

              # Close the issue using the node ID (gh issue close supports node IDs)
              gh issue close "$ISSUE_NODE_ID"
            done
          fi
