name: Board Status Automation

on:
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, closed]

jobs:
  update-board:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Status
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }} # Requires a PAT with project write access
          PROJECT_ID: PVT_kwHOBd-eFs4BU-R3
          FIELD_ID: PVTSSF_lAHOBd-eFs4BU-R3zhPJxp4
        run: |
          # Determine the target status ID based on the event
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            # When issue is opened or assigned, move to 'Building'
            STATUS_ID="fb71c5cb"
            ITEM_ID=$(gh project item-list $PROJECT_ID --owner Bhargava-Ram-Thunga --format json | jq -r '.[] | select(.contentId == "${{ github.event.issue.node_id }}") | .id')
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ github.event.pull_request.state }}" == "open" ]]; then
              # When PR is opened, move to 'Review'
              STATUS_ID="624d0f49"
            else
              # When PR is closed/merged, move to 'Shipped'
              STATUS_ID="9d1ea668"
            fi

            # Find the issue linked to this PR
            ITEM_ID=$(gh pr view ${{ github.event.pull_request.number }} --json linkedIssues | jq -r '.linkedIssues[0].nodeId')
          fi

          if [ -n "$ITEM_ID" ] && [ -n "$STATUS_ID" ]; then
            gh project item-edit --id "$ITEM_ID" --field-id "$FIELD_ID" --single-select-option-id "$STATUS_ID" --project-id "$PROJECT_ID"

            # If merged, close the issue
            if [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
              gh issue close "$ITEM_ID"
            fi
          fi
