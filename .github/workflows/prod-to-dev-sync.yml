name: Prod-to-Dev Sync

on:
  pull_request:
    types: [closed]
    branches:
      - prod

jobs:
  sync-to-dev:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR from prod to dev
        run: |
          gh pr create \
            --title "Sync: Merge prod changes back to dev" \
            --body "This is an automated PR to sync production hotfixes back to the development branch. Generated by the Prod-to-Dev Sync workflow." \
            --base dev \
            --head prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
